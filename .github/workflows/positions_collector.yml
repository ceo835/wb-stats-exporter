name: Positions Collector

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes (trigger-based run)
    - cron: "15 2 * * *" # daily at 05:15 Moscow: collect previous day
  workflow_dispatch:
    inputs:
      force:
        description: "Run collector without trigger flag"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      max_pairs:
        description: "Limit pairs for quick checks (0 = all)"
        required: false
        default: "0"
        type: string
      date_from:
        description: "Backfill start date in YYYY-MM-DD"
        required: false
        default: ""
        type: string
      date_to:
        description: "Backfill end date in YYYY-MM-DD"
        required: false
        default: ""
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create credentials file
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          if [ -n "$GOOGLE_CREDENTIALS_JSON" ]; then
            printf '%s' "$GOOGLE_CREDENTIALS_JSON" > credentials.json
          else
            echo "GOOGLE_CREDENTIALS_JSON secret is empty."
            exit 1
          fi

      - name: Run positions collector
        env:
          LOG_LEVEL: INFO
          GOOGLE_CREDENTIALS_FILE: credentials.json
          GOOGLE_SPREADSHEET_ID: ${{ secrets.GOOGLE_SPREADSHEET_ID }}
          MPSTATS_API_TOKEN: ${{ secrets.MPSTATS_API_TOKEN }}
          MPSTATS_POSITION_URL: ${{ secrets.MPSTATS_POSITION_URL }}
          WB_ANALYTICS_TOKEN: ${{ secrets.WB_ANALYTICS_TOKEN }}
          WB_ANALYTICS_POSITION_URL: ${{ secrets.WB_ANALYTICS_POSITION_URL }}
          WB_FALLBACK_ON_NOT_FOUND: ${{ secrets.WB_FALLBACK_ON_NOT_FOUND }}
          WB_CONTENT_TOKEN: ${{ secrets.WB_CONTENT_TOKEN }}
          WB_CONTENT_URL: ${{ secrets.WB_CONTENT_URL }}
          MY_NM_IDS: ${{ secrets.MY_NM_IDS }}
          POSITIONS_MY_NM_IDS: ${{ secrets.POSITIONS_MY_NM_IDS }}
          POSITIONS_NM_CACHE_FILE: nm_id_cache.json
          POSITIONS_SETTINGS_SHEET: ${{ secrets.POSITIONS_SETTINGS_SHEET }}
          POSITIONS_RAW_SHEET: ${{ secrets.POSITIONS_RAW_SHEET }}
          POSITIONS_STATE_SHEET: ${{ secrets.POSITIONS_STATE_SHEET }}
          POSITIONS_SETTINGS_CSV: ${{ secrets.POSITIONS_SETTINGS_CSV }}
          POSITIONS_TIMEZONE: Europe/Moscow
        run: |
          FORCE_ARG=""
          MAX_PAIRS_ARG="0"
          DATE_FROM_ARG=""
          DATE_TO_ARG=""
          if [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "15 2 * * *" ]; then
            YESTERDAY="$(TZ=Europe/Moscow date -d 'yesterday' +%F)"
            FORCE_ARG="--force"
            DATE_FROM_ARG="--date-from $YESTERDAY"
            DATE_TO_ARG="--date-to $YESTERDAY"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.max_pairs }}" ]; then
            MAX_PAIRS_ARG="${{ inputs.max_pairs }}"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.date_from }}" ]; then
            DATE_FROM_ARG="--date-from ${{ inputs.date_from }}"
          fi
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.date_to }}" ]; then
            DATE_TO_ARG="--date-to ${{ inputs.date_to }}"
          fi
          python run_collector.py $FORCE_ARG --max-pairs "$MAX_PAIRS_ARG" $DATE_FROM_ARG $DATE_TO_ARG

      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: positions-collector-logs
          path: logs/*.log
          if-no-files-found: warn
